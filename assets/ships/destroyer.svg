<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 40" preserveAspectRatio="none">
  <!-- Destroyer: 2 cells, small fast escort ship -->
  <!-- Primary color: Dark teal #4A6B6B -->
  <defs>
    <style>
      .hull { fill: #4A6B6B; }
      .deck { fill: #5A7B7B; }
      .detail { fill: #3A5555; }
      .turret { fill: #405E5E; }
    </style>
  </defs>
  <!-- Hull -->
  <rect class="hull" x="6" y="12" width="72" height="16" rx="2"/>
  <!-- Bow - sharp -->
  <polygon class="hull" points="78,15 88,20 78,25"/>
  <!-- Stern -->
  <polygon class="hull" points="6,15 0,20 6,25"/>
  <!-- Deck -->
  <rect class="deck" x="10" y="14" width="64" height="12" rx="1"/>
  <!-- Forward gun -->
  <rect class="turret" x="14" y="16" width="8" height="8" rx="1"/>
  <rect class="detail" x="22" y="19" width="6" height="2"/>
  <!-- Bridge -->
  <rect class="detail" x="34" y="10" width="14" height="20" rx="1"/>
  <rect class="turret" x="38" y="6" width="3" height="4"/>
  <!-- Funnel -->
  <rect class="detail" x="52" y="12" width="4" height="6" rx="1"/>
  <!-- Aft gun -->
  <rect class="turret" x="60" y="16" width="8" height="8" rx="1"/>
  <rect class="detail" x="68" y="19" width="4" height="2"/>
</svg>
